<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rotary Puebla AR</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', sans-serif; }

      #ar-container {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        overflow: hidden;
        z-index: 0;
      }

      #status-badge {
        position: fixed; top: 20px; left: 50%;
        transform: translateX(-50%);
        padding: 10px 24px; border-radius: 30px;
        font-weight: bold; font-size: 14px; letter-spacing: 1px;
        color: white; white-space: nowrap;
        background: rgba(0, 36, 108, 0.85);
        border: 1px solid #F7A81B;
        box-shadow: 0 0 15px rgba(247,168,27,0.4);
        transition: background 0.3s ease;
        pointer-events: none; z-index: 999;
      }
      #status-badge.found { background: rgba(247, 168, 27, 0.92); color: #001540; }

      #bottom-label {
        position: fixed; bottom: 20px; left: 0; right: 0;
        display: flex; flex-direction: column; align-items: center;
        pointer-events: none; z-index: 999;
      }
      #bottom-label .title { font-size: 16px; font-weight: bold; letter-spacing: 2px; color: #F7A81B; }
      #bottom-label .sub   { font-size: 12px; margin-top: 4px; color: rgba(255,255,255,0.65); }

      /* Scanning ring animation */
      #scan-ring {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 200px; height: 200px;
        border: 2px solid rgba(247,168,27,0.6);
        border-radius: 8px;
        pointer-events: none; z-index: 998;
        animation: scanPulse 2s infinite;
        display: none;
      }
      #scan-ring::before, #scan-ring::after {
        content: '';
        position: absolute;
        width: 20px; height: 20px;
        border-color: #F7A81B; border-style: solid;
      }
      #scan-ring::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
      #scan-ring::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }
      @keyframes scanPulse {
        0%,100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
        50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.05); }
      }
      #scan-ring.active { display: block; }
    </style>
  </head>
  <body>

    <div id="ar-container"></div>
    <div id="status-badge">CARGANDO...</div>
    <div id="scan-ring"></div>

    <div id="bottom-label">
      <div class="title">ROTARY INTERNATIONAL</div>
      <div class="sub">ESCANEA LA TARJETA ROTARY PARA CONECTAR</div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.149.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';

      // ─── CONFIG ────────────────────────────────────────────────
      const TARGET_FILE  = '/tar1.mind';
      const GRACE_PERIOD  = 4000;   // ms de gracia antes de parar video
      // ───────────────────────────────────────────────────────────
      const badge    = document.getElementById('status-badge');
      const scanRing = document.getElementById('scan-ring');
      const container = document.getElementById('ar-container');

      let mindar    = null;
      let rendererRef = null;
      let videoEl   = null;
      let graceTimer    = null;
      let detected  = false;
      let gracePending = false;

      // ── Video element (created once, reused) ──
      function getVideo() {
        if (videoEl) return videoEl;
        videoEl = document.createElement('video');
        videoEl.src = '/VIDEO.mp4';
        videoEl.loop = true;
        videoEl.muted = true;
        videoEl.playsInline = true;
        videoEl.setAttribute('playsinline', '');
        videoEl.setAttribute('webkit-playsinline', '');
        videoEl.load();
        return videoEl;
      }

      // ── UI helpers ──
      function setStatus(state) {
        if (state === 'loading') {
          badge.textContent = 'CARGANDO...';
          badge.classList.remove('found');
          scanRing.classList.remove('active');
        } else if (state === 'scanning') {
          badge.textContent = 'ESCANEANDO...';
          badge.classList.remove('found');
          scanRing.classList.add('active');
        } else if (state === 'found') {
          badge.textContent = '¡TARJETA DETECTADA!';
          badge.classList.add('found');
          scanRing.classList.remove('active');
        }
      }

      // ── Stop current MindAR session ──
      async function stopAR() {
        clearTimeout(graceTimer);
        if (rendererRef) rendererRef.setAnimationLoop(null);
        if (mindar) {
          try { mindar.stop(); } catch(e) {}
          mindar = null;
        }
        // Clean canvas/video injected by MindAR
        container.querySelectorAll('canvas, video').forEach(el => {
          if (el !== videoEl) el.remove();
        });
      }

      // ── Start MindAR with the Rotary target ──
      async function startAR() {
        await stopAR();
        detected   = false;
        gracePending = false;
        setStatus('loading');

        const video = getVideo();

        const m = new MindARThree({
          container,
          imageTargetSrc: TARGET_FILE,
          maxTrack: 1,
          uiLoading: 'no',
          uiScanning: 'no',
          uiError: 'no',
        });
        mindar = m;

        const { renderer, scene, camera } = m;
        rendererRef = renderer;
        const anchor = m.addAnchor(0);

        const texture  = new THREE.VideoTexture(video);
        const material = new THREE.MeshBasicMaterial({ map: texture });
        const plane    = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.5625), material);
        anchor.group.add(plane);

        video.addEventListener('loadedmetadata', () => {
          const aspect = video.videoHeight / video.videoWidth;
          plane.geometry = new THREE.PlaneGeometry(1, aspect);
        }, { once: true });

        anchor.onTargetFound = () => {
          detected     = true;
          gracePending = false;
          clearTimeout(graceTimer);
          clearTimeout(switchTimer);
          setStatus('found');
          video.play().catch(() => {});
        };

        anchor.onTargetLost = () => {
          if (!detected) return;
          gracePending = true;
          graceTimer = setTimeout(() => {
            gracePending = false;
            detected     = false;
            video.pause();
            setStatus('scanning');
          }, GRACE_PERIOD);
        };

        try {
          await m.start();
          setStatus('scanning');
          renderer.setAnimationLoop(() => renderer.render(scene, camera));
        } catch(err) {
          console.error('AR Error:', err);
          badge.textContent = 'ERROR: ' + err;
        }
      }

      // ── Boot ──
      startAR();
    </script>
  </body>
</html>
